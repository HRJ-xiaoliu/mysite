<script>
const smartHeader = document.querySelector('header');
let lastScrollCoordinate = 0;
const hideThreshold = 100;

window.addEventListener('scroll', function() {
    let currentScrollCoordinate = window.pageYOffset || document.documentElement.scrollTop;
    
    if (currentScrollCoordinate > lastScrollCoordinate && currentScrollCoordinate > hideThreshold) {
        smartHeader.classList.add('header-hidden-state');
    } else {
        smartHeader.classList.remove('header-hidden-state');
    }
    
    lastScrollCoordinate = currentScrollCoordinate <= 0 ? 0 : currentScrollCoordinate;
}, { passive: true });
</script>

<script>
    document.addEventListener('DOMContentLoaded', function() {
        var searchInput = document.getElementById('global-search-input');
        var searchBtn = document.getElementById('global-search-btn');

        function executeSearch() {
            var queryText = searchInput.value.trim();
            if (queryText) {
                window.location.href = '/search/?q=' + encodeURIComponent(queryText);
            } else {
                alert("请输入需要检索的学术或新闻关键词");
            }
        }

        if (searchBtn) {
            searchBtn.addEventListener('click', executeSearch);
        }

        if (searchInput) {
            searchInput.addEventListener('keypress', function(event) {
                if (event.key === 'Enter') {
                    event.preventDefault();
                    executeSearch();
                }
            });
        }
    });
</script>
